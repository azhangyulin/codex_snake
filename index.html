<!doctype html>
<html lang='zh-CN'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1,user-scalable=no'>
<title>光轨贪吃蛇</title>
<style>
:root{--bg:#100f1f;--panel:rgba(24,23,42,.86);--line:rgba(255,255,255,.14);--text:#f8f2e7;--muted:#aaa3ba;--cyan:#7cf7df;--green:#8ff56f;--coral:#ff6c77;--amber:#ffd166;--violet:#b991ff;--blue:#76a9ff}*{box-sizing:border-box}html,body{height:100%;margin:0}body{display:grid;place-items:center;overflow:hidden;background:linear-gradient(135deg,rgba(255,108,119,.12),transparent 34%),linear-gradient(315deg,rgba(124,247,223,.14),transparent 36%),var(--bg);color:var(--text);font-family:Microsoft YaHei,PingFang SC,Segoe UI,Arial,sans-serif;user-select:none;-webkit-tap-highlight-color:transparent}body:before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:46px 46px;mask-image:linear-gradient(to bottom,transparent,#000 16%,#000 84%,transparent)}.app{position:relative;z-index:1;display:grid;grid-template-columns:minmax(0,1fr) 220px;gap:18px;width:min(1100px,calc(100vw - 28px));align-items:center}.stage{position:relative;display:grid;place-items:center;min-width:0;border:1px solid var(--line);border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,.05),transparent),#15172b;box-shadow:0 22px 70px rgba(0,0,0,.35),inset 0 0 0 1px rgba(255,255,255,.04);overflow:hidden}canvas{display:block;width:100%;height:auto;max-height:calc(100vh - 40px)}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:22px;background:rgba(12,11,24,.74);backdrop-filter:blur(16px);transition:.18s}.hide{opacity:0;pointer-events:none;transform:scale(.99)}.menu{width:min(430px,100%);display:grid;gap:18px;text-align:center}.eyebrow{color:var(--cyan);font-size:12px;letter-spacing:4px;text-transform:uppercase}h1,h2{margin:0;line-height:1;letter-spacing:0}h1{font-size:42px;text-shadow:0 0 22px rgba(124,247,223,.35)}h2{font-size:34px}.sub{margin:0;color:var(--muted);font-size:14px;line-height:1.7}.modes{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}button{font:inherit}.mode,.btn,.ico{border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.065);color:var(--text);cursor:pointer;transition:.15s}.mode{min-height:78px;padding:10px 8px}.mode strong{display:block;margin-bottom:5px;font-size:15px}.mode span{display:block;color:var(--muted);font-size:12px;line-height:1.35}.mode.on{border-color:var(--cyan);background:rgba(124,247,223,.13);box-shadow:0 0 0 1px rgba(124,247,223,.22),0 0 28px rgba(124,247,223,.13)}.btns{display:flex;justify-content:center;flex-wrap:wrap;gap:10px}.btn{min-width:120px;min-height:44px;padding:11px 18px;font-weight:800}.primary{border-color:transparent;background:linear-gradient(135deg,var(--cyan),var(--green));color:#0d1321}.danger{border-color:rgba(255,108,119,.6);color:#ffdce0;background:rgba(255,108,119,.12)}.mode:hover,.btn:hover,.ico:hover{transform:translateY(-1px);border-color:rgba(130,240,218,.45)}.side{display:grid;gap:12px}.hud,.pad,.mini{display:grid;gap:10px;padding:12px;border:1px solid var(--line);border-radius:8px;background:var(--panel);backdrop-filter:blur(12px)}.tile{min-height:54px;padding:9px 10px;border:1px solid rgba(255,255,255,.08);border-radius:8px;background:rgba(255,255,255,.055)}.lab{display:block;color:var(--muted);font-size:12px}.val{display:block;margin-top:5px;font:800 24px Consolas,monospace;line-height:1}.score .val{color:var(--cyan)}.combo .val{color:var(--coral)}.level .val{color:var(--violet)}.best .val{color:var(--amber)}.mini{display:flex;justify-content:center;gap:8px}.ico{width:46px;height:46px;display:grid;place-items:center;font-size:20px;font-weight:900}.pad{display:none;grid-template-columns:repeat(3,54px);grid-template-rows:repeat(3,54px);justify-content:center;gap:5px}.up{grid-column:2;grid-row:1}.left{grid-column:1;grid-row:2}.mid{grid-column:2;grid-row:2;color:var(--amber)}.right{grid-column:3;grid-row:2}.down{grid-column:2;grid-row:3}.status{min-height:20px;color:var(--muted);font-size:12px;line-height:1.5}.results{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.result{min-height:64px;padding:10px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.055)}.result strong{display:block;margin-bottom:5px;color:var(--cyan);font:800 22px Consolas,monospace}.result span{color:var(--muted);font-size:12px}.toast{position:absolute;top:16px;left:50%;min-width:160px;padding:9px 14px;border:1px solid rgba(255,255,255,.14);border-radius:8px;background:rgba(22,20,38,.94);text-align:center;font-weight:800;transform:translate(-50%,-16px);opacity:0;pointer-events:none;transition:.16s;z-index:5}.toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:860px){body{overflow-y:auto;align-items:start}.app{grid-template-columns:1fr;width:min(680px,calc(100vw - 20px));padding:10px 0 18px}.hud{grid-template-columns:repeat(4,1fr);padding:8px}.tile{min-height:48px;padding:8px}.val{font-size:20px}}@media(max-width:620px),(hover:none){.pad{display:grid}.mini{display:none}}@media(max-width:520px){.hud{grid-template-columns:repeat(2,1fr)}h1{font-size:34px}h2{font-size:28px}.modes{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class='app'>
<section class='stage' id='stage'>
<canvas id='c' width='840' height='560'></canvas><div class='toast' id='toast'>准备</div>
<div class='overlay' id='menu'><div class='menu'><div><div class='eyebrow'>Neon Garden</div><h1>光轨贪吃蛇</h1><p class='sub'>收集能量果，保持连击，躲开自己留下的光轨。</p></div><div class='modes' id='modes'><button class='mode on' data-mode='classic'><strong>街机</strong><span>边界会撞毁，节奏稳步加快</span></button><button class='mode' data-mode='wrap'><strong>穿墙</strong><span>从边缘滑入另一侧，更适合刷分</span></button><button class='mode' data-mode='sprint'><strong>竞速</strong><span>90 秒挑战，奖励更高</span></button></div><div class='btns'><button class='btn primary' id='start'>开始游戏</button></div><p class='sub'>方向键 / WASD 移动，空格暂停。手机可滑动棋盘或使用方向键。</p></div></div>
<div class='overlay hide' id='pause'><div class='menu'><h2>已暂停</h2><p class='sub'>光轨暂时凝住了。</p><div class='btns'><button class='btn primary' id='resume'>继续</button><button class='btn danger' id='again1'>重开</button><button class='btn' id='back1'>菜单</button></div></div></div>
<div class='overlay hide' id='over'><div class='menu'><h2>游戏结束</h2><div class='results' id='results'></div><div class='btns'><button class='btn primary' id='again2'>再来一局</button><button class='btn' id='back2'>菜单</button></div></div></div>
</section>
<aside class='side'><div class='hud'><div class='tile score'><span class='lab'>分数</span><span class='val' id='score'>0</span></div><div class='tile combo'><span class='lab'>连击</span><span class='val' id='combo'>x1</span></div><div class='tile level'><span class='lab'>等级</span><span class='val' id='level'>1</span></div><div class='tile best'><span class='lab'>纪录</span><span class='val' id='best'>0</span></div></div><div class='mini'><button class='ico' id='pauseBtn' title='暂停'>Ⅱ</button><button class='ico' id='mute' title='音效'>♪</button></div><div class='pad'><button class='ico up' data-dir='up'>▲</button><button class='ico left' data-dir='left'>◀</button><button class='ico mid' id='touchPause'>Ⅱ</button><button class='ico right' data-dir='right'>▶</button><button class='ico down' data-dir='down'>▼</button></div><div class='hud'><div class='status' id='status'>选择模式后开始。</div></div></aside>
</main>
<script>
(()=>{const $=id=>document.getElementById(id),C=$('c'),X=C.getContext('2d'),stage=$('stage'),menu=$('menu'),pause=$('pause'),over=$('over'),toast=$('toast'),scoreEl=$('score'),comboEl=$('combo'),levelEl=$('level'),bestEl=$('best'),statusEl=$('status'),results=$('results');const COL=30,ROW=20,dirMap={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}},opp={up:'down',down:'up',left:'right',right:'left'},keys={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',W:'up',s:'down',S:'down',a:'left',A:'left',d:'right',D:'right'};const foods=[['薄荷果',10,'#8ff56f',66],['珊瑚果',25,'#ff6c77',23],['琥珀核',55,'#ffd166',8],['星髓',120,'#b991ff',3]],powers=[['shield','护盾','#76a9ff',6500],['double','双倍','#ff6c77',5800],['slow','缓速','#ffd166',5200]];let cell=24,w=720,h=480,mode='classic',state='menu',snake=[],dir='right',next='right',queued=null,food,bonus,power,active,until=0,parts=[],sparks=[],score=0,combo=0,maxCombo=0,level=1,eaten=0,timeLeft=90,best={},last=0,tick=0,toastUntil=0,audio=null,muted=false;['classic','wrap','sprint'].forEach(m=>best[m]=Number(localStorage.getItem('snake-best-'+m)||0));function fit(){cell=Math.max(12,Math.floor(Math.min(Math.min(840,innerWidth-34)/COL,Math.min(560,innerHeight-40)/ROW)));w=COL*cell;h=ROW*cell;C.width=w;C.height=h;C.style.width=w+'px';C.style.height=h+'px'}function pick(a){let total=a.reduce((s,x)=>s+x[3],0),r=Math.random()*total;for(const x of a){r-=x[3];if(r<=0)return x}return a[0]}function hit(p){return snake.some(s=>s.x==p.x&&s.y==p.y)||(food&&food.x==p.x&&food.y==p.y)||(bonus&&bonus.x==p.x&&bonus.y==p.y)||(power&&power.x==p.x&&power.y==p.y)}function openCell(){for(let i=0;i<300;i++){let p={x:Math.floor(Math.random()*COL),y:Math.floor(Math.random()*ROW)};if(!hit(p))return p}return{x:1,y:1}}function spawnFood(){food={...openCell(),kind:pick(foods),born:performance.now()}}function maybeBonus(now){if(bonus||Math.random()>.26)return;bonus={...openCell(),kind:pick(foods),born:now,ttl:5600}}function maybePower(now){if(power||active||Math.random()>.16)return;power={...openCell(),kind:powers[Math.floor(Math.random()*powers.length)],born:now,ttl:7600}}function reset(){snake=[{x:14,y:10},{x:13,y:10},{x:12,y:10},{x:11,y:10}];dir=next='right';queued=null;food=bonus=power=active=null;parts=[];sparks=[];score=combo=maxCombo=eaten=0;level=1;timeLeft=mode=='sprint'?90:0;tick=0;spawnFood();hud()}function lvlName(){return['初醒','疾行','折光','炽热','流星','深场','极限'][Math.min(level-1,6)]}function speed(){let s=150-Math.min(level-1,8)*11;return Math.max(58,active&&active[0]=='slow'?s+42:s)}function mult(){return mode=='sprint'?1.55:mode=='wrap'?.9:1}function hud(){scoreEl.textContent=score;comboEl.textContent='x'+Math.max(combo,1);levelEl.textContent=level;bestEl.textContent=best[mode]||0;let p=active?'能力：'+active[1]+' '+Math.max(0,(until-performance.now())/1000).toFixed(1)+'s':'能力：无';let t=mode=='sprint'?' · 时间：'+Math.ceil(timeLeft)+'s':'';statusEl.textContent=state=='playing'||state=='paused'?lvlName()+' · 长度 '+snake.length+' · '+p+t:'选择模式后开始。'}function flash(txt,ms=850){toast.textContent=txt;toast.classList.add('show');toastUntil=performance.now()+ms}function ac(){if(audio||muted)return;let A=window.AudioContext||window.webkitAudioContext;if(A)audio=new A}function tone(f,d,type='sine',g=.035,delay=0){if(!audio||muted)return;let o=audio.createOscillator(),v=audio.createGain(),st=audio.currentTime+delay;o.type=type;o.frequency.setValueAtTime(f,st);v.gain.setValueAtTime(g,st);v.gain.exponentialRampToValueAtTime(.001,st+d);o.connect(v);v.connect(audio.destination);o.start(st);o.stop(st+d)}function sound(n){ac();if(n=='eat'){tone(740,.06,'square');tone(980,.07,'triangle',.028,.045)}if(n=='bonus'){tone(620,.08,'triangle');tone(880,.08,'triangle',.03,.06);tone(1180,.1,'triangle',.03,.12)}if(n=='level'){tone(520,.08,'triangle');tone(660,.08,'triangle',.03,.07);tone(880,.13,'triangle',.035,.14)}if(n=='over'){tone(180,.16,'sawtooth',.04);tone(110,.24,'sawtooth',.035,.12)}}function burst(gx,gy,c,n=16){let cx=gx*cell+cell/2,cy=gy*cell+cell/2;for(let i=0;i<n;i++){let a=Math.random()*Math.PI*2,s=45+Math.random()*130;parts.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.45+Math.random()*.35,max:.8,size:2+Math.random()*3,c})}}function setDir(d){if(state!='playing')return;if(d==opp[dir]&&snake.length>1)return;if(queued&&d==opp[queued]&&snake.length>1)return;queued=d}function step(now){if(queued){next=queued;queued=null}dir=next;let v=dirMap[dir],head=snake[0],p={x:head.x+v.x,y:head.y+v.y};if(mode=='wrap'){p.x=(p.x+COL)%COL;p.y=(p.y+ROW)%ROW}let wall=p.x<0||p.x>=COL||p.y<0||p.y>=ROW,self=snake.slice(0,-1).some(s=>s.x==p.x&&s.y==p.y),shield=active&&active[0]=='shield';if((wall||self)&&!shield){end();return}if(wall&&shield){p.x=(p.x+COL)%COL;p.y=(p.y+ROW)%ROW}snake.unshift(p);let grew=false;if(food&&p.x==food.x&&p.y==food.y){collect(food,now,1);food=null;spawnFood();maybeBonus(now);maybePower(now);grew=true}else if(bonus&&p.x==bonus.x&&p.y==bonus.y){collect(bonus,now,1.7);bonus=null;grew=true}else if(power&&p.x==power.x&&p.y==power.y){active=power.kind;until=now+active[3];burst(p.x,p.y,active[2],22);sound('bonus');flash(active[1]);power=null;grew=true}if(!grew){snake.pop();combo=0}if(eaten>=5+level*2){level=Math.min(level+1,9);eaten=0;sound('level');flash('等级 '+level+' · '+lvlName())}hud()}function collect(it,now,bm){let dbl=active&&active[0]=='double'?2:1;combo++;maxCombo=Math.max(maxCombo,combo);eaten++;score+=Math.round(it.kind[1]*mult()*(1+Math.min(combo,10)*.08)*bm*dbl);burst(it.x,it.y,it.kind[2],bm>1?26:15);sound(bm>1?'bonus':'eat');if(combo>1&&combo%5==0)flash(combo+' 连击',720);if(mode=='sprint')timeLeft=Math.min(90,timeLeft+(bm>1?4:1.5));if(Math.random()<.35)sparks.push({x:Math.random()*w,y:Math.random()*h,life:.35,size:2+Math.random()*2,c:it.kind[2]})}function end(){state='gameover';sound('over');if(score>(best[mode]||0)){best[mode]=score;localStorage.setItem('snake-best-'+mode,score)}hud();results.innerHTML='<div class=result><strong>'+score+'</strong><span>最终分数</span></div><div class=result><strong>'+snake.length+'</strong><span>最终长度</span></div><div class=result><strong>'+level+'</strong><span>达到等级</span></div><div class=result><strong>x'+Math.max(maxCombo,1)+'</strong><span>最高连击</span></div>';over.classList.remove('hide')}function start(){ac();reset();state='playing';menu.classList.add('hide');pause.classList.add('hide');over.classList.add('hide');flash('开始')}function pauseGame(){if(state!='playing')return;state='paused';pause.classList.remove('hide');hud()}function resumeGame(){if(state!='paused')return;state='playing';pause.classList.add('hide');flash('继续',560);hud()}function toMenu(){state='menu';menu.classList.remove('hide');pause.classList.add('hide');over.classList.add('hide');hud();draw(performance.now(),0)}function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);X.beginPath();X.moveTo(x+r,y);X.arcTo(x+w,y,x+w,y+h,r);X.arcTo(x+w,y+h,x,y+h,r);X.arcTo(x,y+h,x,y,r);X.arcTo(x,y,x+w,y,r);X.closePath()}function bg(now){let g=X.createLinearGradient(0,0,w,h);g.addColorStop(0,'#15172b');g.addColorStop(.5,'#1a1e32');g.addColorStop(1,'#241b33');X.fillStyle=g;X.fillRect(0,0,w,h);X.save();X.globalAlpha=.4;X.strokeStyle='rgba(255,255,255,.055)';for(let x=0;x<=COL;x++){X.beginPath();X.moveTo(x*cell+.5,0);X.lineTo(x*cell+.5,h);X.stroke()}for(let y=0;y<=ROW;y++){X.beginPath();X.moveTo(0,y*cell+.5);X.lineTo(w,y*cell+.5);X.stroke()}X.restore();let sw=(now*.025)%(w+h);X.save();X.globalAlpha=.08;X.strokeStyle='#7cf7df';X.lineWidth=cell*.35;X.beginPath();X.moveTo(sw-h,h);X.lineTo(sw,0);X.stroke();X.restore()}function cellDraw(p,i){let t=1-i/Math.max(1,snake.length),sz=cell*(.8+t*.16),px=p.x*cell+(cell-sz)/2,py=p.y*cell+(cell-sz)/2,shield=active&&active[0]=='shield',col=shield?'rgb('+(70+t*40)+','+(160+t*70)+',255)':'rgb('+(75+t*70)+','+(205+t*40)+','+(176+t*35)+')';X.save();X.shadowColor=shield?'#76a9ff':'#7cf7df';X.shadowBlur=12;X.fillStyle=col;rr(px,py,sz,sz,sz*.28);X.fill();X.shadowBlur=0;X.strokeStyle='rgba(255,255,255,.18)';X.stroke();X.restore()}function snakeDraw(){for(let i=snake.length-1;i>=0;i--)cellDraw(snake[i],i);let p=snake[0],cx=p.x*cell+cell/2,cy=p.y*cell+cell/2,v=dirMap[dir],perp={x:-v.y,y:v.x};X.fillStyle='#100f1f';[-1,1].forEach(s=>{X.beginPath();X.arc(cx+v.x*cell*.18+perp.x*cell*.14*s,cy+v.y*cell*.18+perp.y*cell*.14*s,Math.max(2,cell*.08),0,Math.PI*2);X.fill()})}function item(it,pow=false){if(!it)return;let e=performance.now()-it.born,cx=it.x*cell+cell/2,cy=it.y*cell+cell/2+Math.sin(e*.004)*cell*.08,r=cell*(pow?.46:.4)*(1+Math.sin(e*.006)*.08),c=pow?it.kind[2]:it.kind[2];X.save();X.shadowColor=c;X.shadowBlur=pow?22:16;X.fillStyle=c;X.beginPath();X.arc(cx,cy,r,0,Math.PI*2);X.fill();X.shadowBlur=0;X.fillStyle='rgba(255,255,255,.44)';X.beginPath();X.arc(cx-r*.28,cy-r*.28,r*.32,0,Math.PI*2);X.fill();X.fillStyle='#141226';X.font='700 '+Math.max(10,cell*.34)+'px Segoe UI,Arial';X.textAlign='center';X.textBaseline='middle';X.fillText(pow?it.kind[1][0]:'+',cx,cy+.5);X.restore()}function particle(dt){for(let i=parts.length-1;i>=0;i--){let p=parts[i];p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.985;p.vy*=.985;if(p.life<=0){parts.splice(i,1);continue}let a=p.life/p.max;X.save();X.globalAlpha=a;X.fillStyle=p.c;X.shadowColor=p.c;X.shadowBlur=8;X.beginPath();X.arc(p.x,p.y,p.size*a,0,Math.PI*2);X.fill();X.restore()}for(let i=sparks.length-1;i>=0;i--){let s=sparks[i];s.life-=dt;if(s.life<=0){sparks.splice(i,1);continue}X.save();X.globalAlpha=s.life/.35;X.fillStyle=s.c;X.fillRect(s.x,s.y,s.size,s.size);X.restore()}}function powerBar(now){if(!active)return;let pct=Math.max(0,(until-now)/active[3]),bw=w*.42,x=(w-bw)/2,y=h-cell*.72;X.save();X.fillStyle='rgba(255,255,255,.14)';rr(x,y,bw,6,3);X.fill();X.fillStyle=active[2];rr(x,y,bw*pct,6,3);X.fill();X.fillStyle='#f8f2e7';X.font='700 '+Math.max(11,cell*.34)+'px Microsoft YaHei,sans-serif';X.textAlign='center';X.fillText(active[1],w/2,y-8);X.restore()}function draw(now,dt){bg(now);item(food);item(bonus);item(power,true);snakeDraw();particle(dt);powerBar(now);if(state=='menu'){X.save();X.globalAlpha=.45;X.fillStyle='#7cf7df';X.font='800 '+Math.max(22,cell*1.05)+'px Microsoft YaHei,sans-serif';X.textAlign='center';X.fillText('READY',w/2,h/2);X.restore()}}function update(now,dt){if(toastUntil&&now>toastUntil){toast.classList.remove('show');toastUntil=0}if(state=='playing'){tick+=dt*1000;if(mode=='sprint'){timeLeft-=dt;if(timeLeft<=0){timeLeft=0;end()}}if(active&&now>=until){active=null;flash('能力结束',520)}if(bonus&&now-bonus.born>bonus.ttl)bonus=null;if(power&&now-power.born>power.ttl)power=null;while(tick>=speed()&&state=='playing'){tick-=speed();step(now)}if(Math.random()<.01)sparks.push({x:Math.random()*w,y:Math.random()*h,life:.35,size:2+Math.random()*2,c:active?active[2]:'#7cf7df'})}hud()}function loop(now){let dt=Math.min(.05,(now-last)/1000||.016);last=now;update(now,dt);draw(now,dt);requestAnimationFrame(loop)}$('modes').onclick=e=>{let b=e.target.closest('.mode');if(!b)return;mode=b.dataset.mode;document.querySelectorAll('.mode').forEach(x=>x.classList.toggle('on',x==b));hud()};$('start').onclick=start;$('resume').onclick=resumeGame;$('again1').onclick=start;$('again2').onclick=start;$('back1').onclick=toMenu;$('back2').onclick=toMenu;$('pauseBtn').onclick=()=>state=='paused'?resumeGame():pauseGame();$('touchPause').onclick=()=>state=='paused'?resumeGame():pauseGame();$('mute').onclick=()=>{muted=!muted;$('mute').textContent=muted?'×':'♪';flash(muted?'音效关闭':'音效开启',560)};document.querySelectorAll('[data-dir]').forEach(b=>b.onpointerdown=e=>{e.preventDefault();setDir(b.dataset.dir)});document.onkeydown=e=>{if(e.key==' '||e.key=='p'||e.key=='P'){e.preventDefault();state=='paused'?resumeGame():pauseGame();return}let d=keys[e.key];if(d){e.preventDefault();setDir(d)}};let touch=null;stage.addEventListener('touchstart',e=>{let t=e.touches[0];touch={x:t.clientX,y:t.clientY}},{passive:true});stage.addEventListener('touchend',e=>{if(!touch)return;let t=e.changedTouches[0],dx=t.clientX-touch.x,dy=t.clientY-touch.y;touch=null;
